<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Embed Example</title>
    <style>
        /* Container for responsive 16:9 aspect ratio */
        .video-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* 16:9 ratio */
            height: 0;
            overflow: hidden;
            background-color: #000; /* Black background while loading */
            border-radius: 8px; /* Optional: rounded corners */
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0; /* Removes the default iframe border */
        }
    </style>
</head>
<body>

    <h2>Live Stream</h2>
    
    <div class="video-container">
        <!-- Replace the src URL with an official, authorized stream URL -->
      <iframe 
  src="https://embed.st/embed/admin/ppv-liechtenstein-vs-cyprus/1" 
  width="100%" 
  height="100%" 
  frameborder="0" 
  allowfullscreen 
  allow="autoplay; encrypted-media; picture-in-picture; fullscreen"
  scrolling="no">
</iframe>
    </div>

</body>
</html>
